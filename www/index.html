<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DO NOT FORGET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --phosphor: #33ff00;
  --phosphor-bright: #7fff33;
  --phosphor-dim: #0a2600;
  --phosphor-mid: #1a5c00;
  --phosphor-glow: rgba(51, 255, 0, 0.5);
  --phosphor-glow-soft: rgba(51, 255, 0, 0.15);
  --screen-bg: #000d00;
  --screen-off: #020202;
  --bezel-body: #2a2a2a;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'VT323', 'Courier New', monospace;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #141414 0%, #090909 60%, #000 100%);
}

/* ─── MONITOR HOUSING ─── */
.monitor {
  position: relative;
  width: 100%;
  height: 100%;
}

/* ─── SCREEN WRAPPER ─── */
.screen-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* ─── SCREEN ─── */
.screen {
  position: relative;
  background: var(--screen-bg);
  padding: 16px 18px;
  padding-top: calc(16px + env(safe-area-inset-top));
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  padding-left: calc(18px + env(safe-area-inset-left));
  padding-right: calc(18px + env(safe-area-inset-right));
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Scanlines */
.screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 2px,
    rgba(0, 0, 0, 0.1) 2px, rgba(0, 0, 0, 0.1) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Vignette */
.screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 101;
}

/* Screen flicker */
.screen.on { animation: flicker 8s linear infinite; }

@keyframes flicker {
  0%    { opacity: 1; }
  3%    { opacity: 0.98; }
  6%    { opacity: 1; }
  42%   { opacity: 1; }
  44%   { opacity: 0.97; }
  46%   { opacity: 1; }
  87%   { opacity: 1; }
  88.5% { opacity: 0.96; }
  90%   { opacity: 1; }
  100%  { opacity: 1; }
}

/* Screen glare */
.screen-glare {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    125deg,
    rgba(255,255,255,0.025) 0%,
    transparent 35%,
    transparent 65%,
    rgba(255,255,255,0.01) 100%
  );
  pointer-events: none;
  z-index: 103;
}

/* Noise */
.noise {
  position: absolute;
  inset: -50%;
  width: 200%; height: 200%;
  z-index: 102;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px;
  animation: noise-shift 0.4s steps(8) infinite;
}

@keyframes noise-shift {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(-4px, 3px); }
  50%  { transform: translate(3px, -4px); }
  75%  { transform: translate(-2px, -2px); }
  100% { transform: translate(4px, 2px); }
}

/* Interference line */
.interference {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(51,255,0,0.06), transparent);
  z-index: 99;
  pointer-events: none;
  animation: interference-scroll 7s linear infinite;
}

@keyframes interference-scroll {
  0%   { top: 110%; }
  100% { top: -3px; }
}

/* ─── CRT TURN-ON EFFECT ─── */
.crt-turnon {
  position: absolute;
  inset: 0;
  background: var(--screen-off);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
}

.crt-turnon .h-line {
  width: 80%;
  height: 2px;
  background: var(--phosphor);
  box-shadow: 0 0 15px var(--phosphor-glow), 0 0 40px var(--phosphor-glow-soft);
  opacity: 0;
  transform: scaleX(0);
}

.crt-turnon.phase-1 .h-line {
  animation: hline-grow 0.5s ease-out forwards;
}

.crt-turnon.phase-2 {
  animation: screen-expand 0.35s ease-in forwards;
}
.crt-turnon.phase-2 .h-line {
  opacity: 1;
  transform: scaleX(1);
}

@keyframes hline-grow {
  0%   { opacity: 0; transform: scaleX(0); }
  30%  { opacity: 1; }
  100% { opacity: 1; transform: scaleX(1); }
}

@keyframes screen-expand {
  0%   { background: var(--screen-off); clip-path: inset(49% 0 49% 0); }
  60%  { background: rgba(51,255,0,0.08); clip-path: inset(0 0 0 0); }
  100% { background: transparent; clip-path: inset(0 0 0 0); opacity: 0; }
}

/* ─── BOOT SCREEN ─── */
.boot-screen {
  position: absolute;
  inset: 0;
  padding: 20px;
  padding-top: calc(20px + env(safe-area-inset-top));
  background: var(--screen-bg);
  display: none;
  flex-direction: column;
  z-index: 200;
  color: var(--phosphor);
  text-shadow: 0 0 8px var(--phosphor-glow);
  overflow: hidden;
}

.boot-screen.active { display: flex; }

.boot-text {
  font-size: 15px;
  line-height: 1.7;
  white-space: pre;
  flex-shrink: 0;
}

.boot-title-area {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.boot-title-area.active { display: flex; }

.boot-title {
  font-size: clamp(32px, 8vw, 52px);
  letter-spacing: 4px;
  text-shadow: 0 0 20px var(--phosphor-glow), 0 0 50px var(--phosphor-glow-soft);
  text-align: center;
}

.boot-subtitle {
  font-size: 18px;
  letter-spacing: 3px;
  opacity: 0.5;
}

.boot-start {
  font-size: 20px;
  margin-top: 28px;
  animation: blink-cursor 1s step-end infinite;
  cursor: pointer;
}

@keyframes blink-cursor {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0; }
}

/* ─── GAME UI ─── */
.game-screen {
  display: none;
  flex-direction: column;
  flex: 1;
  position: relative;
  z-index: 10;
}

.game-screen.active {
  display: flex;
}

/* Top Bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.pause-btn {
  background: none;
  border: 1px solid rgba(51,255,0,0.3);
  color: var(--phosphor);
  font-family: 'VT323', monospace;
  font-size: 16px;
  padding: 3px 10px;
  cursor: pointer;
  text-shadow: 0 0 6px var(--phosphor-glow);
  transition: all 0.2s;
  line-height: 1;
}

.pause-btn:hover {
  background: rgba(51,255,0,0.08);
  border-color: var(--phosphor);
  box-shadow: 0 0 8px var(--phosphor-glow-soft);
}

.top-info {
  display: flex;
  gap: 16px;
  font-size: clamp(18px, 4vw, 24px);
  color: var(--phosphor);
  text-shadow: 0 0 8px var(--phosphor-glow);
}

.top-info span {
  white-space: nowrap;
}

#scoreDisplay,
#trialDisplay {
  min-width: 10ch;
  text-align: right;
}

/* Grid */
.grid-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  width: min(100%, 380px);
  aspect-ratio: 1;
}

/* Cells */
.cell {
  aspect-ratio: 1;
  background: var(--phosphor-dim);
  border: 1px solid rgba(51, 255, 0, 0.06);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  transition: background 0.6s ease-out, box-shadow 0.6s ease-out, border-color 0.6s ease-out;
}

.cell::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.6s ease-out;
  background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
}

.cell:not(.lit):not(.selected):not(.correct):not(.wrong):not(.missed):hover {
  background: rgba(51, 255, 0, 0.12);
  border-color: rgba(51, 255, 0, 0.2);
}

/* Lit cells (during memorize) */
.cell.lit {
  background: var(--phosphor);
  border-color: rgba(51, 255, 0, 0.4);
  box-shadow: 0 0 12px var(--phosphor-glow), 0 0 25px var(--phosphor-glow-soft);
  transition: background 0.06s ease-in, box-shadow 0.06s ease-in, border-color 0.06s ease-in;
}
.cell.lit::after {
  opacity: 1;
  transition: opacity 0.06s ease-in;
}

/* Selected cells (during input) */
.cell.selected {
  background: var(--phosphor);
  border-color: rgba(51, 255, 0, 0.4);
  box-shadow: 0 0 12px var(--phosphor-glow), 0 0 20px var(--phosphor-glow-soft);
  transition: background 0.06s, box-shadow 0.06s;
}
.cell.selected::after { opacity: 1; transition: opacity 0.06s; }

/* Correct */
.cell.correct {
  background: var(--phosphor-bright);
  border-color: rgba(127, 255, 51, 0.5);
  box-shadow: 0 0 18px var(--phosphor-glow), 0 0 35px var(--phosphor-glow-soft);
  transition: all 0.15s;
  animation: cell-correct-pop 0.35s ease;
}
.cell.correct::after { opacity: 1; }

@keyframes cell-correct-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* Wrong */
.cell.wrong {
  background: #3d0000;
  border-color: #880000;
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.25);
  transition: all 0.15s;
}
.cell.wrong::after { opacity: 0; }

/* Missed */
.cell.missed {
  background: var(--phosphor-mid);
  border-color: rgba(51, 255, 0, 0.2);
  box-shadow: 0 0 8px var(--phosphor-glow-soft);
  animation: cell-missed-blink 0.35s ease 3;
  transition: all 0.15s;
}

@keyframes cell-missed-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

/* Status */
.status-area {
  flex-shrink: 0;
  text-align: center;
  padding-top: 14px;
}

.status-text {
  font-size: clamp(22px, 5vw, 30px);
  color: var(--phosphor);
  text-shadow: 0 0 12px var(--phosphor-glow);
  min-height: 1.3em;
  letter-spacing: 2px;
}

.status-text.blink { animation: blink-cursor 1s step-end infinite; }

.status-sub {
  font-size: 16px;
  color: var(--phosphor);
  text-shadow: 0 0 6px var(--phosphor-glow);
  min-height: 1.3em;
  opacity: 0.5;
  margin-top: 2px;
}

/* ─── PAUSE OVERLAY ─── */
.pause-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 10, 0, 0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 150;
  font-size: clamp(36px, 10vw, 56px);
  color: var(--phosphor);
  text-shadow: 0 0 25px var(--phosphor-glow), 0 0 50px var(--phosphor-glow-soft);
  letter-spacing: 10px;
}
.pause-overlay.active {
  display: flex;
  animation: blink-cursor 1.2s step-end infinite;
}

/* ─── GAME OVER ─── */
.gameover-screen {
  position: absolute;
  inset: 0;
  padding: 20px;
  background: var(--screen-bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  color: var(--phosphor);
  text-shadow: 0 0 12px var(--phosphor-glow);
  gap: 8px;
}
.gameover-screen.active { display: flex; }

.gameover-label {
  font-size: 20px;
  letter-spacing: 3px;
  opacity: 0.6;
}

.gameover-msg {
  font-size: clamp(28px, 7vw, 42px);
  letter-spacing: 3px;
  text-shadow: 0 0 20px var(--phosphor-glow);
}

.gameover-score {
  font-size: clamp(48px, 12vw, 72px);
  text-shadow: 0 0 30px var(--phosphor-glow), 0 0 60px var(--phosphor-glow-soft);
  line-height: 1;
  margin: 8px 0;
}

.gameover-detail {
  font-size: 16px;
  opacity: 0.4;
  margin-bottom: 10px;
}

.gameover-restart {
  font-size: 20px;
  margin-top: 20px;
  animation: blink-cursor 1s step-end infinite;
  cursor: pointer;
}

/* Score popup */
/* Lives display */
.lives-flash { animation: life-lost 0.5s ease; }
@keyframes life-lost {
  0%,100% { color: var(--phosphor); }
  25%,50% { color: #ff3333; text-shadow: 0 0 12px rgba(255,0,0,0.6); }
}

/* Grid expansion message */
.grid-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(28px, 7vw, 42px);
  color: var(--phosphor);
  text-shadow: 0 0 20px var(--phosphor-glow), 0 0 50px var(--phosphor-glow-soft);
  letter-spacing: 4px;
  z-index: 50;
  pointer-events: none;
}

.score-pop {
  position: absolute;
  font-size: 22px;
  color: var(--phosphor-bright);
  text-shadow: 0 0 10px var(--phosphor-glow);
  animation: pop-float 0.9s ease-out forwards;
  pointer-events: none;
  z-index: 50;
  white-space: nowrap;
}

@keyframes pop-float {
  0%   { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-35px); opacity: 0; }
}

/* ─── TITLE MENU ─── */
.boot-menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-top: 28px;
}

.boot-menu-item {
  font-size: 20px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.15s;
  padding: 4px 12px;
}

.boot-menu-item.active {
  opacity: 1;
  animation: blink-cursor 1s step-end infinite;
}

.boot-menu-item.hidden {
  display: none;
}

/* ─── PERFORMANCE LOG ─── */
.log-screen {
  position: absolute;
  inset: 0;
  padding: 20px;
  padding-top: calc(20px + env(safe-area-inset-top));
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  padding-left: calc(20px + env(safe-area-inset-left));
  padding-right: calc(20px + env(safe-area-inset-right));
  background: var(--screen-bg);
  display: none;
  flex-direction: column;
  z-index: 200;
  color: var(--phosphor);
  text-shadow: 0 0 8px var(--phosphor-glow);
  overflow: hidden;
}

.log-screen.active { display: flex; }

.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.log-title {
  font-size: clamp(22px, 5vw, 28px);
  letter-spacing: 3px;
}

.log-back {
  font-size: 18px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.15s;
}

.log-back:hover { opacity: 1; }

.log-stats {
  font-size: 15px;
  opacity: 0.6;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.log-table-header {
  font-size: 14px;
  opacity: 0.4;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(51, 255, 0, 0.15);
  padding-bottom: 6px;
  margin-bottom: 6px;
  flex-shrink: 0;
  white-space: pre;
}

.log-entries {
  flex: 1;
  overflow-y: auto;
  font-size: 16px;
  line-height: 1.8;
}

.log-entries::-webkit-scrollbar {
  width: 4px;
}

.log-entries::-webkit-scrollbar-track {
  background: var(--phosphor-dim);
}

.log-entries::-webkit-scrollbar-thumb {
  background: rgba(51, 255, 0, 0.3);
  border-radius: 2px;
}

.log-entry {
  white-space: pre;
  opacity: 0.7;
}

.log-empty {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  opacity: 0.4;
}

.log-empty.active { display: flex; }

/* ─── RESPONSIVE ─── */
@media (max-height: 650px) {
  .screen { padding: 10px 14px; }
  .grid { width: min(100%, 300px); }
  .top-bar { margin-bottom: 6px; }
  .status-area { padding-top: 8px; }
}

@media (max-width: 380px) {
  .grid { gap: 4px; }
}
</style>
</head>
<body>

<div class="monitor">
  <div class="screen-wrapper">
    <div class="screen" id="screen">

      <!-- CRT Turn-on -->
      <div class="crt-turnon" id="crtTurnon">
        <div class="h-line"></div>
      </div>

      <!-- Boot Screen -->
      <div class="boot-screen" id="bootScreen">
        <div class="boot-text" id="bootText"></div>
        <div class="boot-title-area" id="bootTitleArea">
          <div class="boot-title">DO NOT FORGET</div>
          <div class="boot-subtitle">CRT EDITION v1.0</div>
          <div class="boot-menu" id="bootMenu">
            <div class="boot-menu-item hidden" id="menuContinue" data-action="continue">[ CONTINUE ]</div>
            <div class="boot-menu-item" id="menuClassic" data-action="classic">[ CLASSIC ]</div>
            <div class="boot-menu-item" id="menuSurvival" data-action="survival">[ SURVIVAL ]</div>
            <div class="boot-menu-item" id="menuLog" data-action="log">[ PERFORMANCE LOG ]</div>
          </div>
        </div>
      </div>

      <!-- Game Screen -->
      <div class="game-screen" id="gameScreen">
        <div class="top-bar">
          <button class="pause-btn" id="pauseBtn">| |</button>
          <div class="top-info">
            <span id="livesDisplay"></span>
            <span id="trialDisplay">TRIAL 1/12</span>
            <span id="scoreDisplay">SCORE 0</span>
          </div>
        </div>
        <div class="grid-area">
          <div class="grid" id="grid"></div>
        </div>
        <div class="status-area">
          <div class="status-text" id="statusText"></div>
          <div class="status-sub" id="statusSub"></div>
        </div>
      </div>

      <!-- Pause Overlay -->
      <div class="pause-overlay" id="pauseOverlay">PAUSED</div>

      <!-- Game Over Screen -->
      <div class="gameover-screen" id="gameoverScreen">
        <div class="gameover-label" id="gameoverLabel">GAME COMPLETE</div>
        <div class="gameover-msg" id="gameoverMsg">WELL DONE</div>
        <div class="gameover-label" id="gameoverScoreLabel">FINAL SCORE</div>
        <div class="gameover-score" id="gameoverScore">0</div>
        <div class="gameover-detail" id="gameoverDetail"></div>
        <div class="gameover-restart" id="gameoverRestart">[ PRESS ANY KEY ]</div>
      </div>

      <!-- Performance Log Screen -->
      <div class="log-screen" id="logScreen">
        <div class="log-header">
          <div class="log-title">PERFORMANCE LOG</div>
          <div class="log-back" id="logBack">[ BACK ]</div>
        </div>
        <div class="log-stats" id="logStats"></div>
        <div class="log-table-header" id="logTableHeader">DATE          SCORE  TRIALS  PERFECT</div>
        <div class="log-entries" id="logEntries"></div>
        <div class="log-empty" id="logEmpty">NO DATA RECORDED YET.</div>
      </div>

      <!-- Effect Layers -->
      <div class="noise"></div>
      <div class="interference"></div>
      <div class="screen-glare"></div>

    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// AUDIO ENGINE (Web Audio API)
// ─────────────────────────────────────────
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tone(freq, dur, type = 'square', vol = 0.07) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

const sfx = {
  pip:     () => tone(920, 0.045, 'square', 0.06),
  click:   () => tone(500, 0.025, 'square', 0.05),
  declick: () => tone(350, 0.025, 'square', 0.04),
  success: () => {
    tone(523, 0.1, 'square', 0.055);
    setTimeout(() => tone(659, 0.1, 'square', 0.055), 90);
    setTimeout(() => tone(784, 0.14, 'square', 0.055), 180);
  },
  perfect: () => {
    [523, 659, 784, 1047].forEach((f, i) =>
      setTimeout(() => tone(f, 0.12, 'square', 0.055), i * 70)
    );
  },
  error:    () => tone(140, 0.3, 'sawtooth', 0.07),
  boot:     () => tone(1000, 0.06, 'sine', 0.03),
  bootOk:   () => { tone(800, 0.05, 'sine', 0.03); setTimeout(() => tone(1200, 0.08, 'sine', 0.03), 60); },
  lifeLost: () => { tone(200, 0.15, 'sawtooth', 0.06); setTimeout(() => tone(150, 0.2, 'sawtooth', 0.06), 120); },
};

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
const state = {
  trial: 1,
  maxTrials: 12,
  score: 0,
  phase: 'off',       // off, boot, title, memorize, input, feedback, gameover, log
  pattern: [],
  selected: [],
  gridSize: 5,
  paused: false,
  canClick: false,
  perfectCount: 0,
  menuIndex: 0,
  menuItems: [],
  gameMode: 'classic', // 'classic' | 'survival'
  lives: 3,
  maxLives: 3,
  level: 1,            // used by classic only
};

function effectiveTrial() {
  if (state.gameMode === 'survival') return state.trial;
  return (state.level - 1) * 12 + state.trial;
}

function getPatternSize() {
  const t = effectiveTrial();
  const size = t <= 12
    ? 3 + Math.floor((t - 1) / 2)
    : 8 + Math.floor((t - 12) / 3);
  return Math.min(25, size);
}

function getMemorizeTime() {
  const t = effectiveTrial();
  const time = t <= 12
    ? Math.max(1100, 2600 - (t - 1) * 130)
    : Math.max(700, 1100 - (t - 12) * 25);
  return time;
}

// ─────────────────────────────────────────
// PAUSABLE TIMER SYSTEM
// ─────────────────────────────────────────
const timers = {
  _entries: [],

  set(callback, ms) {
    const entry = { callback, startTime: Date.now(), remaining: ms };
    entry.id = setTimeout(() => {
      this._remove(entry);
      callback();
    }, ms);
    this._entries.push(entry);
  },

  _remove(entry) {
    const idx = this._entries.indexOf(entry);
    if (idx !== -1) this._entries.splice(idx, 1);
  },

  pause() {
    const now = Date.now();
    this._entries.forEach(e => {
      clearTimeout(e.id);
      e.remaining = Math.max(0, e.remaining - (now - e.startTime));
    });
  },

  resume() {
    this._entries.forEach(e => {
      e.startTime = Date.now();
      e.id = setTimeout(() => {
        this._remove(e);
        e.callback();
      }, e.remaining);
    });
  },

  clearAll() {
    this._entries.forEach(e => clearTimeout(e.id));
    this._entries = [];
  }
};

// ─────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────
const sleep = ms => new Promise(r => timers.set(r, ms));

function getCells() {
  return Array.from(els.grid.querySelectorAll('.cell'));
}

// ─────────────────────────────────────────
// PERSISTENCE (localStorage)
// ─────────────────────────────────────────
function loadGameLog(key) {
  try {
    return JSON.parse(localStorage.getItem(key)) || [];
  } catch { return []; }
}

function saveGameLog(key, entry) {
  try {
    const log = loadGameLog(key);
    log.unshift(entry);
    if (log.length > 100) log.length = 100;
    localStorage.setItem(key, JSON.stringify(log));
  } catch {}
}

function loadClassicLevel() {
  return parseInt(localStorage.getItem('dnf_classic_level')) || 1;
}

function saveClassicLevel(level) {
  localStorage.setItem('dnf_classic_level', String(level));
}

function loadSavedGame() {
  try {
    return JSON.parse(localStorage.getItem('dnf_saved_game'));
  } catch { return null; }
}

function saveGameProgress() {
  if (state.gameMode !== 'classic') return;
  try {
    localStorage.setItem('dnf_saved_game', JSON.stringify({
      trial: state.trial,
      score: state.score,
      perfectCount: state.perfectCount,
      level: state.level,
      gridSize: state.gridSize,
      savedAt: new Date().toISOString()
    }));
  } catch {}
}

function clearSavedGame() {
  try { localStorage.removeItem('dnf_saved_game'); } catch {}
}

function recordGameResult() {
  if (state.gameMode === 'classic') {
    saveGameLog('dnf_game_log', {
      id: Date.now(),
      date: new Date().toISOString(),
      score: state.score,
      trialsCompleted: state.maxTrials,
      maxTrials: state.maxTrials,
      perfectCount: state.perfectCount,
      level: state.level
    });
  } else {
    saveGameLog('dnf_survival_log', {
      id: Date.now(),
      date: new Date().toISOString(),
      score: state.score,
      trialsReached: state.trial,
      perfectCount: state.perfectCount,
      maxGrid: state.gridSize
    });
  }
}

// ─────────────────────────────────────────
// GRID
// ─────────────────────────────────────────
function updateGridSizing() {
  const cfg = { 5: {w:'380px',g:'5px'}, 6: {w:'380px',g:'5px'},
                7: {w:'400px',g:'4px'}, 8: {w:'420px',g:'3px'} }[state.gridSize];
  els.grid.style.gridTemplateColumns = `repeat(${state.gridSize}, 1fr)`;
  els.grid.style.width = `min(100%, ${cfg.w})`;
  els.grid.style.gap = cfg.g;
}

function checkGridExpansion() {
  if (state.gridSize >= 8) return false;
  const total = state.gridSize * state.gridSize;
  if (getPatternSize() > Math.floor(total * 0.4)) {
    state.gridSize++;
    buildGrid();
    return true;
  }
  return false;
}

function buildGrid() {
  els.grid.innerHTML = '';
  const total = state.gridSize * state.gridSize;
  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    cell.addEventListener('click', () => onCellClick(i));
    els.grid.appendChild(cell);
  }
  updateGridSizing();
}

// ─────────────────────────────────────────
// PATTERN GENERATION
// ─────────────────────────────────────────
function generatePattern(count) {
  const total = state.gridSize * state.gridSize;
  const set = new Set();
  while (set.size < count) {
    set.add(Math.floor(Math.random() * total));
  }
  return [...set];
}

// ─────────────────────────────────────────
// GAME FLOW
// ─────────────────────────────────────────
function showPattern() {
  const cells = getCells();
  state.pattern.forEach((idx, i) => {
    timers.set(() => {
      cells[idx].classList.add('lit');
      sfx.pip();
    }, i * 70);
  });
}

function hidePattern() {
  getCells().forEach(c => c.classList.remove('lit'));
}

function resetCells() {
  getCells().forEach(c => {
    c.className = 'cell';
  });
}

function updateLivesDisplay() {
  if (state.gameMode !== 'survival') {
    els.livesDisplay.textContent = '';
    els.livesDisplay.style.display = 'none';
    return;
  }
  els.livesDisplay.style.display = '';
  let txt = '';
  for (let i = 0; i < state.maxLives; i++) {
    txt += i < state.lives ? '\u25A0' : '\u25A1';
    if (i < state.maxLives - 1) txt += ' ';
  }
  els.livesDisplay.textContent = txt;
}

function updateTrialDisplay() {
  if (state.gameMode === 'survival') {
    els.trialDisplay.textContent = `TRIAL ${state.trial}`;
  } else {
    els.trialDisplay.textContent = `LVL ${state.level} \u2014 TRIAL ${state.trial}/${state.maxTrials}`;
  }
}

async function startTrial() {
  state.phase = 'memorize';
  state.selected = [];
  state.canClick = false;

  // Check grid expansion
  const expanded = checkGridExpansion();
  if (expanded) {
    // Show grid expansion message
    const msg = document.createElement('div');
    msg.className = 'grid-msg';
    msg.textContent = `GRID ${state.gridSize}\u00D7${state.gridSize}`;
    els.gameScreen.appendChild(msg);
    sfx.bootOk();
    await sleep(1200);
    if (state.phase !== 'memorize') { msg.remove(); return; }
    msg.remove();
  }

  resetCells();

  updateTrialDisplay();
  updateLivesDisplay();
  els.statusSub.textContent = '';

  const pSize = getPatternSize();
  state.pattern = generatePattern(pSize);

  // Brief pause, then show
  els.statusText.textContent = 'MEMORIZE';
  els.statusText.classList.remove('blink');

  await sleep(600);
  if (state.phase !== 'memorize') return;

  showPattern();

  const revealDur = state.pattern.length * 70;
  const memTime = getMemorizeTime();

  await sleep(revealDur + memTime);
  if (state.phase !== 'memorize') return;

  hidePattern();

  await sleep(200);
  if (state.phase !== 'memorize') return;

  // Switch to input
  state.phase = 'input';
  state.canClick = true;
  els.statusText.textContent = 'YOUR TURN';
  els.statusText.classList.add('blink');
  els.statusSub.textContent = `0 / ${pSize}`;
}

function onCellClick(index) {
  if (state.phase !== 'input' || state.paused || !state.canClick) return;

  const cells = getCells();
  const cell = cells[index];

  if (state.selected.includes(index)) {
    state.selected = state.selected.filter(i => i !== index);
    cell.classList.remove('selected');
    sfx.declick();
  } else {
    state.selected.push(index);
    cell.classList.add('selected');
    sfx.click();
  }

  const pSize = getPatternSize();
  els.statusSub.textContent = `${state.selected.length} / ${pSize}`;

  if (state.selected.length >= pSize) {
    state.canClick = false;
    timers.set(() => evaluate(), 250);
  }
}

async function evaluate() {
  state.phase = 'feedback';
  els.statusText.classList.remove('blink');

  const cells = getCells();
  const pSize = getPatternSize();

  let correct = 0;
  let wrong = 0;

  // Mark selected as correct or wrong
  state.selected.forEach(idx => {
    if (state.pattern.includes(idx)) {
      cells[idx].classList.remove('selected');
      cells[idx].classList.add('correct');
      correct++;
    } else {
      cells[idx].classList.remove('selected');
      cells[idx].classList.add('wrong');
      wrong++;
    }
  });

  // Mark missed
  state.pattern.forEach(idx => {
    if (!state.selected.includes(idx)) {
      cells[idx].classList.add('missed');
    }
  });

  const perfect = correct === pSize && wrong === 0;
  const points = Math.max(0, correct * 10 - wrong * 5) + (perfect ? 50 : 0);

  if (perfect) state.perfectCount++;

  state.score += points;
  els.scoreDisplay.textContent = `SCORE ${state.score}`;

  // Survival: lose a life on imperfect trial
  if (state.gameMode === 'survival' && wrong > 0) {
    state.lives--;
    updateLivesDisplay();
    els.livesDisplay.classList.add('lives-flash');
    setTimeout(() => els.livesDisplay.classList.remove('lives-flash'), 500);
    sfx.lifeLost();
  }

  // Status
  if (perfect) {
    els.statusText.textContent = '>>> PERFECT <<<';
    sfx.perfect();
  } else if (correct > wrong) {
    els.statusText.textContent = `${correct}/${pSize} CORRECT`;
    sfx.success();
  } else {
    els.statusText.textContent = 'MISS';
    sfx.error();
  }

  if (points > 0) {
    els.statusSub.textContent = `+${points} PTS`;
    showScorePop(points);
  } else {
    els.statusSub.textContent = '';
  }

  await sleep(2000);
  if (state.phase !== 'feedback') return;

  if (state.gameMode === 'survival') {
    if (state.lives <= 0) {
      showGameOver();
    } else {
      state.trial++;
      startTrial();
    }
  } else {
    // Classic mode
    if (state.trial >= state.maxTrials) {
      // Level complete — advance
      showGameOver();
      state.level++;
      saveClassicLevel(state.level);
    } else {
      state.trial++;
      saveGameProgress();
      startTrial();
    }
  }
}

function showScorePop(pts) {
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = `+${pts}`;
  // Position near the score display
  const rect = els.scoreDisplay.getBoundingClientRect();
  const screenRect = els.screen.getBoundingClientRect();
  pop.style.right = '18px';
  pop.style.top = `${rect.bottom - screenRect.top + 4}px`;
  els.screen.appendChild(pop);
  setTimeout(() => pop.remove(), 950);
}

// ─────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────
function showGameOver() {
  state.phase = 'gameover';
  recordGameResult();
  clearSavedGame();
  els.gameoverScreen.classList.add('active');

  if (state.gameMode === 'survival') {
    // Survival game over
    els.gameoverLabel.textContent = 'SIGNAL LOST';
    els.gameoverScoreLabel.textContent = 'TRIAL REACHED';
    els.gameoverScore.textContent = state.trial;

    const t = state.trial;
    if (t >= 40)      els.gameoverMsg.textContent = 'LEGENDARY';
    else if (t >= 25) els.gameoverMsg.textContent = 'INCREDIBLE';
    else if (t >= 15) els.gameoverMsg.textContent = 'STRONG';
    else              els.gameoverMsg.textContent = 'GAME OVER';

    els.gameoverDetail.textContent = `${state.perfectCount} PERFECT  |  SCORE ${state.score}  |  MAX GRID ${state.gridSize}\u00D7${state.gridSize}`;

    sfx.lifeLost();
    setTimeout(() => sfx.lifeLost(), 300);
  } else {
    // Classic game over
    els.gameoverLabel.textContent = 'LEVEL COMPLETE';
    els.gameoverScoreLabel.textContent = 'FINAL SCORE';
    els.gameoverScore.textContent = state.score;

    const pct = state.perfectCount / state.maxTrials;
    if (pct >= 0.9)      els.gameoverMsg.textContent = 'FLAWLESS';
    else if (pct >= 0.6) els.gameoverMsg.textContent = 'EXCELLENT';
    else if (pct >= 0.3) els.gameoverMsg.textContent = 'WELL DONE';
    else                 els.gameoverMsg.textContent = 'GAME OVER';

    els.gameoverDetail.textContent = `LEVEL ${state.level} \u2014 ${state.perfectCount}/${state.maxTrials} PERFECT TRIALS`;
  }

  // Return to title listener
  const handler = () => {
    document.removeEventListener('keydown', handler);
    els.gameoverRestart.removeEventListener('click', handler);
    returnToTitle();
  };
  setTimeout(() => {
    document.addEventListener('keydown', handler);
    els.gameoverRestart.addEventListener('click', handler);
  }, 600);
}

// ─────────────────────────────────────────
// TITLE MENU
// ─────────────────────────────────────────
function showTitleMenu() {
  state.phase = 'title';

  const saved = loadSavedGame();
  const classicLevel = loadClassicLevel();
  const items = [];

  if (saved) {
    els.menuContinue.textContent = `[ CONTINUE \u2014 LVL ${saved.level || 1} TRIAL ${saved.trial} ]`;
    els.menuContinue.classList.remove('hidden');
    items.push(els.menuContinue);
  } else {
    els.menuContinue.classList.add('hidden');
  }

  els.menuClassic.textContent = `[ CLASSIC \u2014 LEVEL ${classicLevel} ]`;
  items.push(els.menuClassic);
  items.push(els.menuSurvival);
  items.push(els.menuLog);

  state.menuItems = items;
  state.menuIndex = 0;
  updateMenuSelection();
}

function updateMenuSelection() {
  state.menuItems.forEach((item, i) => {
    item.classList.toggle('active', i === state.menuIndex);
  });
}

function handleMenuInput(action) {
  if (state.phase !== 'title') return;
  ensureAudio();

  if (action === 'up') {
    state.menuIndex = (state.menuIndex - 1 + state.menuItems.length) % state.menuItems.length;
    sfx.pip();
    updateMenuSelection();
  } else if (action === 'down') {
    state.menuIndex = (state.menuIndex + 1) % state.menuItems.length;
    sfx.pip();
    updateMenuSelection();
  } else if (action === 'select') {
    const item = state.menuItems[state.menuIndex];
    const act = item.dataset.action;
    sfx.pip();
    if (act === 'continue') continueGame();
    else if (act === 'classic') startNewGame('classic');
    else if (act === 'survival') startNewGame('survival');
    else if (act === 'log') openLogScreen();
  }
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function startNewGame(mode) {
  clearSavedGame();
  state.gameMode = mode || 'classic';
  state.trial = 1;
  state.score = 0;
  state.perfectCount = 0;
  state.selected = [];
  state.pattern = [];

  if (state.gameMode === 'survival') {
    state.lives = 3;
    state.maxLives = 3;
    state.level = 1;
    state.gridSize = 5;
  } else {
    state.level = loadClassicLevel();
    state.lives = 0;
    // Compute required grid size for this level's starting effective trial
    state.gridSize = 5;
    while (state.gridSize < 8) {
      const total = state.gridSize * state.gridSize;
      if (getPatternSize() <= Math.floor(total * 0.4)) break;
      state.gridSize++;
    }
  }

  buildGrid();
  els.scoreDisplay.textContent = 'SCORE 0';
  els.bootScreen.classList.remove('active');
  els.gameScreen.classList.add('active');
  updateLivesDisplay();
  startTrial();
}

function continueGame() {
  const saved = loadSavedGame();
  if (!saved) { startNewGame('classic'); return; }

  state.gameMode = 'classic';
  state.trial = saved.trial;
  state.score = saved.score;
  state.perfectCount = saved.perfectCount;
  state.level = saved.level || 1;
  state.gridSize = saved.gridSize || 5;
  state.lives = 0;
  state.selected = [];
  state.pattern = [];

  buildGrid();
  els.scoreDisplay.textContent = `SCORE ${state.score}`;
  els.bootScreen.classList.remove('active');
  els.gameScreen.classList.add('active');
  updateLivesDisplay();
  startTrial();
}

function returnToTitle() {
  ensureAudio();
  sfx.pip();

  timers.clearAll();
  state.paused = false;
  els.pauseOverlay.classList.remove('active');
  els.pauseBtn.textContent = '| |';

  // Reset grid to default
  state.gridSize = 5;
  buildGrid();

  els.gameoverScreen.classList.remove('active');
  els.gameScreen.classList.remove('active');
  els.bootScreen.classList.add('active');
  els.bootText.style.display = 'none';
  els.bootTitleArea.classList.add('active');

  showTitleMenu();
}

function openLogScreen() {
  showLogScreen();
}

// ─────────────────────────────────────────
// PERFORMANCE LOG
// ─────────────────────────────────────────
function showLogScreen() {
  state.phase = 'log';

  const classicLog = loadGameLog('dnf_game_log');
  const survivalLog = loadGameLog('dnf_survival_log');

  // Merge and tag entries
  const allEntries = [
    ...classicLog.map(e => ({ ...e, mode: 'CLSC' })),
    ...survivalLog.map(e => ({ ...e, mode: 'SURV' }))
  ].sort((a, b) => new Date(b.date) - new Date(a.date));

  if (allEntries.length === 0) {
    els.logStats.textContent = '';
    els.logEntries.innerHTML = '';
    els.logEntries.style.display = 'none';
    els.logTableHeader.style.display = 'none';
    els.logEmpty.classList.add('active');
  } else {
    els.logEmpty.classList.remove('active');
    els.logEntries.style.display = '';
    els.logTableHeader.style.display = '';

    // Stats
    const classicLevel = loadClassicLevel();
    const survivalBest = survivalLog.length > 0
      ? Math.max(...survivalLog.map(e => e.trialsReached))
      : 0;
    let statsText = `CLASSIC: LEVEL ${classicLevel}`;
    if (survivalLog.length > 0) {
      statsText += `  |  SURVIVAL BEST: ${survivalBest} TRIALS`;
    }
    els.logStats.textContent = statsText;

    els.logTableHeader.textContent = 'DATE        MODE  SCORE  TRIALS  PERFECT';

    // Entries
    els.logEntries.innerHTML = allEntries.map(e => {
      const d = new Date(e.date);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const date = `${mm}/${dd} ${hh}:${min}`;
      const mode = e.mode;
      const score = String(e.score).padStart(5);
      const trials = e.mode === 'SURV'
        ? String(e.trialsReached).padStart(6)
        : `${e.trialsCompleted}/${e.maxTrials}`.padStart(6);
      const perfect = String(e.perfectCount).padStart(7);
      return `<div class="log-entry">${date}  ${mode}  ${score}  ${trials}  ${perfect}</div>`;
    }).join('');
  }

  els.logScreen.classList.add('active');
}

function hideLogScreen() {
  els.logScreen.classList.remove('active');
  showTitleMenu();
}

// ─────────────────────────────────────────
// PAUSE
// ─────────────────────────────────────────
function togglePause() {
  if (state.phase === 'off' || state.phase === 'boot' || state.phase === 'title' || state.phase === 'gameover' || state.phase === 'log') return;
  state.paused = !state.paused;
  els.pauseOverlay.classList.toggle('active', state.paused);
  els.pauseBtn.textContent = state.paused ? ' > ' : '| |';
  if (state.paused) timers.pause();
  else timers.resume();
}

els.pauseBtn.addEventListener('click', togglePause);
els.pauseOverlay.addEventListener('click', togglePause);

// Menu item click handlers
[els.menuContinue, els.menuClassic, els.menuSurvival, els.menuLog].forEach(item => {
  item.addEventListener('click', () => {
    if (state.phase !== 'title') return;
    const idx = state.menuItems.indexOf(item);
    if (idx === -1) return;
    state.menuIndex = idx;
    updateMenuSelection();
    handleMenuInput('select');
  });
});

// Long-press Classic menu item to reset level
let classicLongPressTimer = null;
let classicLongPressTriggered = false;
els.menuClassic.addEventListener('pointerdown', (e) => {
  classicLongPressTriggered = false;
  classicLongPressTimer = setTimeout(() => {
    classicLongPressTimer = null;
    classicLongPressTriggered = true;
    saveClassicLevel(1);
    els.menuClassic.textContent = '[ LEVEL RESET ]';
    sfx.bootOk();
    setTimeout(() => {
      els.menuClassic.textContent = '[ CLASSIC \u2014 LEVEL 1 ]';
    }, 1000);
  }, 600);
});
els.menuClassic.addEventListener('pointerup', () => {
  if (classicLongPressTimer) { clearTimeout(classicLongPressTimer); classicLongPressTimer = null; }
});
els.menuClassic.addEventListener('pointerleave', () => {
  if (classicLongPressTimer) { clearTimeout(classicLongPressTimer); classicLongPressTimer = null; }
});
els.menuClassic.addEventListener('click', (e) => {
  if (classicLongPressTriggered) { e.stopImmediatePropagation(); classicLongPressTriggered = false; }
}, true);

// Log back button
els.logBack.addEventListener('click', () => {
  if (state.phase === 'log') hideLogScreen();
});

document.addEventListener('keydown', e => {
  // Title menu navigation
  if (state.phase === 'title') {
    if (e.key === 'ArrowUp') { handleMenuInput('up'); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { handleMenuInput('down'); e.preventDefault(); }
    else if (e.key === 'Enter') { handleMenuInput('select'); e.preventDefault(); }
    return;
  }

  // Log screen
  if (state.phase === 'log') {
    if (e.key === 'Escape') { hideLogScreen(); }
    return;
  }

  // Pause
  if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
    if (state.phase !== 'off' && state.phase !== 'boot' && state.phase !== 'gameover') {
      togglePause();
    }
  }
});

// ─────────────────────────────────────────
// BOOT SEQUENCE
// ─────────────────────────────────────────
async function bootSequence() {
  state.phase = 'boot';

  // Phase 1: CRT turn-on line
  await sleep(400);
  els.crtTurnon.classList.add('phase-1');
  await sleep(600);

  // Phase 2: expand to full screen
  els.crtTurnon.classList.add('phase-2');
  els.screen.classList.add('on');
  await sleep(450);

  els.crtTurnon.style.display = 'none';
  els.bootScreen.classList.add('active');

  // Boot text lines
  const lines = [
    'DO NOT FORGET BIOS v2.04',
    'COPYRIGHT (C) 2026 THIS WHOLE WORLD LLC.',
    '',
    'CHECKING SYSTEM ...',
    '  PHOSPHOR ARRAY ........ OK',
    '  VIDEO RAM 64K ......... OK',
    '  PATTERN GENERATOR ..... OK',
    '  SCORE REGISTER ........ OK',
    '',
    'ALL SYSTEMS NOMINAL.',
    'LOADING DO NOT FORGET ...',
  ];

  for (const line of lines) {
    els.bootText.textContent += line + '\n';
    sfx.boot();
    await sleep(120 + Math.random() * 100);
  }

  // Progress bar
  const bar = '||||||||||||||||||||';
  for (let i = 1; i <= bar.length; i++) {
    els.bootText.textContent =
      els.bootText.textContent.replace(/LOADING DO NOT FORGET \.\.\.[\s\S]*$/, '') +
      'LOADING DO NOT FORGET ...\n  [' + bar.slice(0, i) + ' '.repeat(bar.length - i) + '] ' + Math.round((i / bar.length) * 100) + '%';
    await sleep(40);
  }

  sfx.bootOk();
  await sleep(400);

  // Show title menu
  els.bootText.style.display = 'none';
  els.bootTitleArea.classList.add('active');

  showTitleMenu();
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
function init() {
  buildGrid();
  bootSequence();
}

init();
</script>
